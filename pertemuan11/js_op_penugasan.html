<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            //javascript operator penugasan
            let a=10;
            console.log("a = " + a);
            a += 5;
            console.log("a += 5 = " + a);
            a -= 3;
            console.log("a -= 3 = " + a);
            a *= 2;
            console.log("a *= 2 = " + a);
            a /= 4;
            console.log("a /= 4 = " + a);
            a %= 3;
            console.log("a %= 3 = " + a);
        
        </script>
    </body>
</html>
