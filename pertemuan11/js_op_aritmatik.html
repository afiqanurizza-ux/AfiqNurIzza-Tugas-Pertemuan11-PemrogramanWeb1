<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            //javascript operator aritmatik
            let a=10;
            let b=5;
            console.log("a + b = " + (a+b));
            console.log("a - b = " + (a-b));
            console.log("a * b = " + (a*b));
            console.log("a / b = " + (a/b));
            console.log("a % b = " + (a%b));


        </script>
    </body>
</html>
